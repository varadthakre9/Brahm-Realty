# Render Blueprint for Bhram Realty
# Deploy: Render Dashboard -> New + -> Blueprint -> pick this repo.
# Secret values (sync:false) are entered in the Render dashboard, never in git.
services:
  - type: web
    name: bhram-realty
    runtime: node
    plan: free
    region: singapore
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
