# =====================================================================
# Netlify build configuration for Bhram Realty
# =====================================================================

[build]
  publish  = "_site"
  command  = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# -----------------------------
# Headers — keep /admin out of search indexes
# -----------------------------
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# -----------------------------
# Redirects — friendly /admin shortcut
# -----------------------------
[[redirects]]
  from   = "/admin"
  to     = "/admin/"
  status = 301
  force  = true
